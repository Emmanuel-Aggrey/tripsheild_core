<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif; }
    .container { max-width: 560px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; }
    .header { background-color: #4F46E5; padding: 32px; text-align: center; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
    .body { padding: 40px 32px; text-align: center; }
    .body p { color: #555555; font-size: 15px; line-height: 1.6; }
    .code { display: inline-block; margin: 24px 0; font-size: 36px; font-weight: bold; letter-spacing: 12px; color: #4F46E5; background: #f0efff; padding: 16px 32px; border-radius: 8px; }
    .expiry { color: #999999; font-size: 13px; }
    .footer { background-color: #f4f4f4; padding: 20px; text-align: center; color: #aaaaaa; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Email Verification</h1>
    </div>
    <div class="body">
      <p>Hi <strong>{{ name }}</strong>,</p>
      <p>Use the code below to verify your email address.</p>
      <div class="code">{{ code }}</div>
      <p class="expiry">This code expires in <strong>{{ expiry_minutes }} minutes</strong>.</p>
      <p>If you did not request this, please ignore this email.</p>
    </div>
    <div class="footer">
      &copy; {{ current_year }} {{ app_name }}. All rights reserved.
    </div>
  </div>
</body>
</html>
